services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      POSTGRES_DB: finance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://finance:finance@db:5432/finance
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # One-shot: `docker compose run --rm seed`
  seed:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://finance:finance@db:5432/finance
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "python", "-m", "scripts.seed"]
    profiles: ["tools"]

volumes:
  pgdata:
