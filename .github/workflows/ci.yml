name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: finance
          POSTGRES_PASSWORD: finance
          POSTGRES_DB: finance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://finance:finance@localhost:5432/finance
      # conftest provides ANTHROPIC_API_KEY/AI_API_KEY defaults; the LLM is never
      # called in tests, so no real credentials are needed.

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q
